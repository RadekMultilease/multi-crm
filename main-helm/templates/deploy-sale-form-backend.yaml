{{- $config := index .Values.apps "sale-form-backend" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sale-form-backend
  labels:
    app: sale-form-backend
spec:
  replicas: {{ $config.image.replicas }}
  selector:
    matchLabels:
      app: sale-form-backend
  template:
    metadata:
      labels:
        app: sale-form-backend
    spec:
      containers:
      - name: sale-form-backend-container
        image: "{{ $config.image.repository }}:{{ $config.image.tag }}"
        env:
          - name: DB_HOST
            value: "postgres-db"
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: DB_USER
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: DB_PASSWORD
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: postgres-credentials
                key: DB_NAME
        ports:
        {{- range $portConfig := $config.service.ports }}
          - name: {{ $portConfig.name }}
            containerPort: {{ $portConfig.port }}
        {{- end }}
        resources:
{{ toYaml $config.resources | nindent 10 }}