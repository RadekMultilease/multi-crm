{{- range $appName, $appConfig := .Values.apps }}
{{- if and $appConfig.ingress $appConfig.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $appName }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    # Tutaj możesz dodać np. limity wielkości uploadu dla konkretnych apek
    nginx.ingress.kubernetes.io/proxy-body-size: {{ $appConfig.ingress.uploadLimit | default "1m" | quote }}
spec:
  rules:
  - host: {{ $appConfig.ingress.host | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $appName }}-service
            port:
              # Teraz używamy wyłącznie zdefiniowanego ingressPort
              number: {{ $appConfig.ingress.ingressPort }}
---
{{- end }}
{{- end }}