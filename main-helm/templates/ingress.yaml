{{- range $appName, $appConfig := .Values.apps }}
{{- if and $appConfig.ingress $appConfig.ingress.enabled }}
{{- /* Simple, clean, and handles hyphens/dots/caps automatically */ -}}
{{- $kebabName := $appName | kebabcase -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $kebabName }}-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: {{ $appConfig.ingress.uploadLimit | default "1m" | quote }}
spec:
  rules:
  - host: {{ $appConfig.ingress.host | quote }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ $kebabName }}-service
            port:
              number: {{ $appConfig.ingress.ingressPort }}
---
{{- end }}
{{- end }}