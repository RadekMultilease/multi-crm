{{- range $appName, $appConfig := .Values.apps }}
{{- /* Convert app name to kebab-case consistently */ -}}
{{- $kebabName := $appName | kebabcase -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ $kebabName }}-service
  labels:
    app: {{ $kebabName }}
spec:
  selector:
    app: {{ $kebabName }}
  type: {{ $appConfig.service.type | default "ClusterIP" }}
  ports:
  {{- range $portConfig := $appConfig.service.ports }}
  - name: {{ $portConfig.name }}
    protocol: TCP
    port: {{ $portConfig.port }}
    targetPort: {{ $portConfig.targetPort | default $portConfig.port }}
  {{- end }}
---
{{- end }}