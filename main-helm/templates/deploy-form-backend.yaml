{{- $config := .Values.apps.formBackend -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: form-backend
  labels:
    app: form-backend
spec:
  replicas: {{ $config.image.replicas }}
  selector:
    matchLabels:
      app: form-backend
  template:
    metadata:
      labels:
        app: form-backend
    spec:
      containers:
      - name: backend-container
        image: "{{ $config.image.repository }}:{{ $config.image.tag }}"
        ports:
        {{- range $portConfig := $config.service.ports }}
          - name: {{ $portConfig.name }}
            containerPort: {{ $portConfig.port }}
        {{- end }}
        resources:
{{ toYaml $config.resources | nindent 10 }}